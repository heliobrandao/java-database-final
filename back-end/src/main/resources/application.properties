spring.application.name=code

spring.datasource.url=jdbc:mysql://127.0.0.1:3311/inventory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.data.mongodb.uri=mongodb://admin:admin123@localhost:27017/reviews?authSource=admin

management.endpoint.health.show-details=always
management.health.db.enabled=true

